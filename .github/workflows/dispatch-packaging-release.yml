name: Dispatch packaging release

on:
  release:
    types:
      - published

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger packaging repository
        env:
          GH_TOKEN: ${{ secrets.PACKAGING_REPO_DISPATCH_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/Gildedboy/ani-cli-mx-packaging/dispatches \
            --data "{\"event_type\":\"ani-cli-mx-release\",\"client_payload\":{\"tag\":\"${TAG_NAME}\",\"ubuntu_series\":\"noble\"}}"
